name: Mirror_surface CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Report syntax errors and undefined names (informational until codebase grows)
          flake8 . --count --exit-zero --select=E9,F63,F7,F82 --show-source --statistics
          # Style warnings at max line length 127 (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest tests/ -v; else echo "No tests directory found — skipping"; fi

  health-check:
    name: Surface Health Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow files
        run: |
          echo "Validating .github/workflows/*.yml structure..."
          for f in .github/workflows/*.yml; do
            echo "  Checking: $f"
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "  OK: $f" || echo "  FAIL: $f"
          done

      - name: Check for Enoch integration stubs
        run: |
          echo "Checking Enoch integration readiness..."
          if [ -f enoch/stub.py ]; then
            echo "Enoch stub found — integration layer ready"
          else
            echo "Enoch stub not yet present — awaiting Enoch module"
          fi
          echo "Mirror_surface health check complete"
